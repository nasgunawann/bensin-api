name: Sync Pertamina Prices

on:
  schedule:
    - cron: "0 */1 * * *" # hourly; adjust as needed
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run generator (fetch upstream)
        run: |
          python src/fetch_normalize.py --fetch
      - name: Run tests
        run: |
          python -m pytest
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update v1 snapshots [skip ci]"
          title: "chore: update v1 fuel price snapshots"
          body: |
            This PR is automatically generated by the schedule sync workflow.
            It contains the latest normalized Pertamina fuel price snapshots under `v1/`.
          branch: "sync/update-snapshots"
          delete-branch: true
      - name: Auto-merge Pull Request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --delete-branch
